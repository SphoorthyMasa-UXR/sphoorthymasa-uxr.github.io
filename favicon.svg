<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a2e1a"/>
  <!-- Lotus outline - golden line art -->
  <g fill="none" stroke="#ffd700" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center petal -->
    <path d="M16 8 C14 12, 14 16, 16 20 C18 16, 18 12, 16 8Z"/>
    <!-- Left petal -->
    <path d="M12 11 C10 14, 11 17, 14 19 C14 16, 13 13, 12 11Z"/>
    <!-- Right petal -->
    <path d="M20 11 C22 14, 21 17, 18 19 C18 16, 19 13, 20 11Z"/>
    <!-- Far left petal -->
    <path d="M9 14 C8 16, 9 18, 12 20 C12 17, 10 15, 9 14Z"/>
    <!-- Far right petal -->
    <path d="M23 14 C24 16, 23 18, 20 20 C20 17, 22 15, 23 14Z"/>
    <!-- Base curve -->
    <path d="M8 22 C11 20, 14 19, 16 20 C18 19, 21 20, 24 22"/>
  </g>
</svg>
